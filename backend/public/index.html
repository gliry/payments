<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniFlow — API Test Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    .app { max-width: 720px; margin: 0 auto; }

    h1 { text-align: center; margin-bottom: 4px; font-size: 28px; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card h2 { font-size: 16px; margin-bottom: 14px; color: #a29bfe; }

    label { display: block; color: #aaa; font-size: 13px; margin-bottom: 6px; }

    input, select {
      width: 100%; padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #fff; font-size: 14px;
      margin-bottom: 12px;
    }
    input:focus, select:focus { outline: none; border-color: #6c5ce7; }
    input::placeholder { color: #555; }

    .btn {
      padding: 10px 18px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; margin-right: 8px; margin-bottom: 8px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(108,92,231,0.3);
    }

    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.15); }

    .btn-danger { background: rgba(214,48,49,0.3); color: #ff7675; }
    .btn-danger:hover:not(:disabled) { background: rgba(214,48,49,0.45); }

    .btn-sm { padding: 8px 14px; font-size: 13px; }

    .row { display: flex; gap: 10px; align-items: flex-end; }
    .row > * { flex: 1; }

    .token-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; margin-top: 12px;
      background: rgba(0,184,148,0.1);
      border: 1px solid rgba(0,184,148,0.2);
      border-radius: 8px; font-size: 12px;
      word-break: break-all;
    }
    .token-bar .label { color: #00b894; font-weight: 600; white-space: nowrap; }
    .token-bar .val { color: #ccc; flex: 1; }

    .user-info { margin-top: 12px; font-size: 13px; color: #aaa; line-height: 1.7; }
    .user-info span { color: #00b894; font-family: monospace; font-size: 12px; }

    .hidden { display: none !important; }

    .response-box {
      margin-top: 12px; padding: 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      max-height: 600px; overflow: auto;
    }
    .response-box pre {
      font-family: 'Monaco','Menlo','Consolas', monospace;
      font-size: 12px; color: #ccc;
      white-space: pre-wrap; word-break: break-all;
    }
    .response-box .res-status { font-size: 11px; margin-bottom: 6px; font-weight: 600; }
    .res-ok { color: #00b894; }
    .res-err { color: #ff7675; }

    .endpoint-group { margin-bottom: 18px; }
    .endpoint-group h3 {
      font-size: 13px; color: #ddd; margin-bottom: 8px;
      padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .form-row { margin-top: 10px; }
    .form-row label { margin-bottom: 4px; }

    .loading {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      margin-top: 10px; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
    }
    .status-msg.info { background: rgba(108,92,231,0.15); border: 1px solid rgba(108,92,231,0.25); color: #a29bfe; }
    .status-msg.success { background: rgba(0,184,148,0.15); border: 1px solid rgba(0,184,148,0.25); color: #00b894; }
    .status-msg.error { background: rgba(214,48,49,0.15); border: 1px solid rgba(214,48,49,0.25); color: #ff7675; }

    .sep { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 12px 0; }
  </style>
</head>
<body>
  <div class="app">
    <h1>OmniFlow</h1>
    <p class="subtitle">API Test Client &mdash; Passkey + ZeroDev Kernel Wallet</p>

    <!-- ===== AUTH ===== -->
    <div class="card" id="authCard">
      <h2>Auth</h2>
      <label for="username">Username / Email</label>
      <input type="text" id="username" placeholder="alice@example.com" />

      <div>
        <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">
          Create Wallet (Register)
        </button>
        <button class="btn btn-secondary" id="loginBtn" onclick="doLogin()">
          Login
        </button>
      </div>

      <div id="authStatus"></div>

      <div id="authInfo" class="hidden">
        <div class="token-bar">
          <span class="label">JWT</span>
          <span class="val" id="jwtDisplay"></span>
        </div>
        <div class="user-info">
          Wallet: <span id="infoWallet"></span><br>
          Delegate: <span id="infoDelegate"></span><br>
          User ID: <span id="infoUserId"></span>
        </div>
      </div>
    </div>

    <!-- ===== API EXPLORER ===== -->
    <div class="card hidden" id="explorerCard">
      <h2>API Explorer</h2>

      <!-- Auth -->
      <div class="endpoint-group">
        <h3>Auth</h3>
        <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/auth/me')">GET /auth/me</button>
      </div>

      <!-- Wallet -->
      <div class="endpoint-group">
        <h3>Wallet</h3>
        <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/wallet')">GET /wallet</button>
        <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/wallet/balances')">GET /wallet/balances</button>

        <div class="form-row">
          <label>Delegate (prepare + sign + submit atomically)</label>
          <div class="row">
            <select id="delegateChain">
              <option value="polygon">polygon</option>
              <option value="avalanche">avalanche</option>
              <option value="base">base</option>
              <option value="optimism">optimism</option>
              <option value="arbitrum">arbitrum</option>
            </select>
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doPrepareDelegate()">Setup Delegate</button>
          </div>
        </div>

        <div class="form-row">
          <label>Enable Executor (ECDSA validator for server-side settlement)</label>
          <div class="row">
            <select id="enableExecutorChain">
              <option value="polygon">polygon</option>
              <option value="avalanche">avalanche</option>
              <option value="base">base</option>
              <option value="optimism">optimism</option>
              <option value="arbitrum">arbitrum</option>
            </select>
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doEnableExecutor()">Enable Executor</button>
          </div>
        </div>

        <div class="form-row">
          <label>Diagnostics</label>
          <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/wallet/paymaster-status')">Paymaster Status</button>
          <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/wallet/executor-status')">Executor Status</button>
        </div>
      </div>

      <!-- Operations -->
      <div class="endpoint-group">
        <h3>Operations</h3>
        <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/operations')">GET /operations</button>

        <!-- Collect -->
        <div class="form-row">
          <label>Collect: select source chains &mdash; deposits on-chain USDC to Gateway</label>
          <div class="row" style="align-items:center">
            <div id="collectChains" style="display:flex;gap:10px;flex-wrap:wrap">
              <label style="font-size:13px;cursor:pointer"><input type="checkbox" value="polygon"> polygon</label>
              <label style="font-size:13px;cursor:pointer"><input type="checkbox" value="avalanche"> avalanche</label>
              <label style="font-size:13px;cursor:pointer"><input type="checkbox" value="base"> base</label>
              <label style="font-size:13px;cursor:pointer"><input type="checkbox" value="optimism"> optimism</label>
              <label style="font-size:13px;cursor:pointer"><input type="checkbox" value="arbitrum"> arbitrum</label>
            </div>
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doCollect()">POST collect</button>
          </div>
        </div>

        <hr class="sep">

        <!-- Send USDC to address -->
        <div class="form-row">
          <label>Send USDC to address (optional: swap to output token via LiFi)</label>
          <div class="row">
            <input type="text" id="sendAddress" placeholder="0xRecipient..." style="margin-bottom:0" />
          </div>
          <div class="row" style="margin-top:6px">
            <select id="sendDestChain">
              <option value="polygon">polygon</option>
              <option value="avalanche">avalanche</option>
              <option value="base">base</option>
              <option value="optimism">optimism</option>
              <option value="arbitrum">arbitrum</option>
            </select>
            <input type="text" id="sendAmount" placeholder="10.00" style="max-width:100px;margin-bottom:0" />
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doSend()">POST send</button>
          </div>
          <div class="row" style="margin-top:6px">
            <input type="text" id="sendOutputToken" placeholder="Output token 0x... (optional — LiFi swap)" style="margin-bottom:0" />
            <input type="text" id="sendOutputDecimals" placeholder="18" value="" style="max-width:60px;margin-bottom:0" title="Output token decimals" />
            <input type="text" id="sendSlippage" placeholder="0.005" value="" style="max-width:70px;margin-bottom:0" title="Slippage" />
          </div>
        </div>

        <hr class="sep">

        <!-- Bridge -->
        <div class="form-row">
          <label>Bridge USDC between chains (send to self)</label>
          <div class="row">
            <div>
              <label style="font-size:11px">From</label>
              <select id="bridgeFrom">
                <option value="polygon">polygon</option>
                <option value="avalanche">avalanche</option>
                <option value="base">base</option>
                <option value="optimism">optimism</option>
                <option value="arbitrum">arbitrum</option>
              </select>
            </div>
            <div>
              <label style="font-size:11px">To</label>
              <select id="bridgeTo">
                <option value="avalanche">avalanche</option>
                <option value="polygon">polygon</option>
                <option value="base">base</option>
                <option value="optimism">optimism</option>
                <option value="arbitrum">arbitrum</option>
              </select>
            </div>
            <input type="text" id="bridgeAmount" placeholder="50.00" style="max-width:100px;margin-bottom:0" />
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doBridge()">POST bridge</button>
          </div>
        </div>

        <hr class="sep">

        <!-- Batch Send -->
        <div class="form-row">
          <label>Batch Send (multiple recipients via POST /operations/send)</label>
          <div id="batchRecipientRows"></div>
          <button class="btn btn-sm btn-secondary" style="margin-bottom:8px" onclick="addBatchRow()">+ Add recipient</button>
          <div class="row">
            <div>
              <label style="font-size:11px">Source chain (optional)</label>
              <select id="batchSourceChain">
                <option value="">default (polygon)</option>
                <option value="polygon">polygon</option>
                <option value="avalanche">avalanche</option>
                <option value="base">base</option>
                <option value="optimism">optimism</option>
                <option value="arbitrum">arbitrum</option>
              </select>
            </div>
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doBatchSend()">POST batch-send</button>
          </div>
        </div>

        <hr class="sep">

        <!-- Swap & Deposit -->
        <div class="form-row">
          <label>Swap & Deposit: any token &rarr; USDC &rarr; Gateway (via LiFi)</label>
          <div class="row">
            <select id="swapDepositChain">
              <option value="polygon">polygon</option>
              <option value="avalanche">avalanche</option>
              <option value="base">base</option>
              <option value="optimism">optimism</option>
              <option value="arbitrum">arbitrum</option>
            </select>
            <input type="text" id="swapDepositToken" placeholder="Token address 0x..." style="margin-bottom:0" />
          </div>
          <div class="row" style="margin-top:6px">
            <input type="text" id="swapDepositAmount" placeholder="0.5" style="max-width:100px;margin-bottom:0" />
            <input type="text" id="swapDepositDecimals" placeholder="18" value="18" style="max-width:60px;margin-bottom:0" title="Token decimals" />
            <input type="text" id="swapDepositSlippage" placeholder="0.005" value="" style="max-width:70px;margin-bottom:0" title="Slippage" />
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doSwapDeposit()">POST swap-deposit</button>
          </div>
        </div>

        <hr class="sep">

        <!-- Operation detail + submit -->
        <div class="form-row">
          <label>Operation by ID</label>
          <div class="row">
            <input type="text" id="opId" placeholder="operation UUID" style="margin-bottom:0" />
            <button class="btn btn-sm btn-secondary" style="flex:none"
              onclick="doGetOp()">GET</button>
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doSubmitOp()">POST submit</button>
          </div>
        </div>
        <div class="form-row">
          <label>Submit signatures (JSON: [{"stepId":"...","txHash":"0x..."}])</label>
          <input type="text" id="opSignatures" placeholder='[{"stepId":"...","txHash":"0x..."}]' />
        </div>
      </div>

      <!-- Payments (Checkout / Pay-in) -->
      <div class="endpoint-group">
        <h3>Payments</h3>
        <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/payments')">GET /payments</button>

        <div class="form-row">
          <label>Create Invoice</label>
          <div class="row">
            <input type="text" id="payAmount" placeholder="100.00" style="max-width:100px;margin-bottom:0" />
            <select id="payToken" style="margin-bottom:0">
              <option value="USDC">USDC</option>
              <option value="USDT">USDT</option>
              <option value="DAI">DAI</option>
              <option value="WETH">WETH</option>
              <option value="WBTC">WBTC</option>
              <option value="LINK">LINK</option>
              <option value="UNI">UNI</option>
              <option value="AAVE">AAVE</option>
            </select>
            <select id="payChain" style="margin-bottom:0">
              <option value="polygon">polygon</option>
              <option value="avalanche">avalanche</option>
              <option value="base">base</option>
              <option value="optimism">optimism</option>
              <option value="arbitrum">arbitrum</option>
            </select>
          </div>
          <div class="row" style="margin-top:6px">
            <input type="text" id="payDesc" placeholder="Description (optional)" style="margin-bottom:0" />
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doCreatePayment()">POST create</button>
          </div>
        </div>

        <div class="form-row">
          <label>Get / Cancel Payment</label>
          <div class="row">
            <input type="text" id="payId" placeholder="payment UUID" style="margin-bottom:0" />
            <button class="btn btn-sm btn-secondary" style="flex:none"
              onclick="doGetPayment()">GET</button>
            <button class="btn btn-sm btn-danger" style="flex:none"
              onclick="doCancelPayment()">CANCEL</button>
          </div>
        </div>
      </div>

      <!-- Webhooks -->
      <div class="endpoint-group">
        <h3>Webhooks</h3>
        <button class="btn btn-sm btn-secondary" onclick="apiCall('GET', '/v1/webhooks')">GET /webhooks</button>

        <div class="form-row">
          <label>Register webhook</label>
          <div class="row">
            <input type="text" id="webhookUrl" placeholder="https://example.com/webhook" style="margin-bottom:0" />
            <button class="btn btn-sm btn-primary" style="flex:none"
              onclick="doCreateWebhook()">POST create</button>
          </div>
        </div>

        <div class="form-row">
          <label>Delete webhook</label>
          <div class="row">
            <input type="text" id="webhookDeleteId" placeholder="webhook UUID" style="margin-bottom:0" />
            <button class="btn btn-sm btn-danger" style="flex:none"
              onclick="doDeleteWebhook()">DELETE</button>
          </div>
        </div>
      </div>

      <!-- Response -->
      <div id="apiResponse" class="response-box hidden">
        <div class="res-status" id="resStatus"></div>
        <pre id="resBody"></pre>
      </div>
    </div>

  </div>

  <script type="module">
    // ── SDK imports (viem only — for UserOp signing) ──
    let toWebAuthnAccount;

    try {
      const viemAA = await import('https://esm.sh/viem@2.21.0/account-abstraction');
      toWebAuthnAccount = viemAA.toWebAuthnAccount;
      console.log('viem 2.21.0 AA loaded, toWebAuthnAccount:', typeof toWebAuthnAccount);
    } catch (err) {
      console.warn('viem 2.21.0 failed, trying 2.45.1:', err.message);
      try {
        const viemAA = await import('https://esm.sh/viem@2.45.1/account-abstraction');
        toWebAuthnAccount = viemAA.toWebAuthnAccount;
        console.log('viem 2.45.1 AA loaded, toWebAuthnAccount:', typeof toWebAuthnAccount);
      } catch (err2) {
        console.error('All viem imports failed:', err2);
      }
    }

    const API = ''; // relative — same origin

    // ── Base64url helpers ────────────────────────────────
    function base64UrlToBytes(b64u) {
      const b64 = b64u.replace(/-/g, '+').replace(/_/g, '/');
      const pad = '='.repeat((4 - (b64.length % 4)) % 4);
      const bin = atob(b64 + pad);
      return Uint8Array.from(bin, c => c.charCodeAt(0));
    }

    function bytesToBase64Url(bytes) {
      const bin = String.fromCharCode(...bytes);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    // ── WebAuthn helpers ─────────────────────────────────
    function toCreationOptions(opts) {
      return {
        ...opts,
        challenge: base64UrlToBytes(opts.challenge),
        user: { ...opts.user, id: base64UrlToBytes(opts.user.id) },
        ...(opts.excludeCredentials && {
          excludeCredentials: opts.excludeCredentials.map(c => ({ ...c, id: base64UrlToBytes(c.id) })),
        }),
      };
    }

    function toRequestOptions(opts) {
      return {
        ...opts,
        challenge: base64UrlToBytes(opts.challenge),
        ...(opts.allowCredentials && {
          allowCredentials: opts.allowCredentials.map(c => ({ ...c, id: base64UrlToBytes(c.id) })),
        }),
      };
    }

    function serializeCredential(cred) {
      if (typeof cred.toJSON === 'function') return cred.toJSON();
      const resp = {};
      if (cred.response.attestationObject) resp.attestationObject = bytesToBase64Url(new Uint8Array(cred.response.attestationObject));
      if (cred.response.clientDataJSON) resp.clientDataJSON = bytesToBase64Url(new Uint8Array(cred.response.clientDataJSON));
      if (cred.response.authenticatorData) resp.authenticatorData = bytesToBase64Url(new Uint8Array(cred.response.authenticatorData));
      if (cred.response.signature) resp.signature = bytesToBase64Url(new Uint8Array(cred.response.signature));
      if (cred.response.userHandle) resp.userHandle = bytesToBase64Url(new Uint8Array(cred.response.userHandle));
      return {
        id: cred.id, rawId: bytesToBase64Url(new Uint8Array(cred.rawId)),
        type: cred.type, authenticatorAttachment: cred.authenticatorAttachment,
        response: resp, clientExtensionResults: cred.getClientExtensionResults(),
      };
    }

    async function extractPublicKeyHex(cred) {
      const spki = new Uint8Array(cred.response.getPublicKey());
      const key = await crypto.subtle.importKey('spki', spki, { name: 'ECDSA', namedCurve: 'P-256' }, true, ['verify']);
      const raw = new Uint8Array(await crypto.subtle.exportKey('raw', key));
      const x = raw.slice(1, 33);
      const prefix = raw[64] % 2 === 0 ? 0x02 : 0x03;
      const compressed = new Uint8Array([prefix, ...x]);
      return '0x' + Array.from(compressed).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ── State ───────────────────────────────────────────
    let jwt = localStorage.getItem('omniflow_jwt') || null;
    let userInfo = JSON.parse(localStorage.getItem('omniflow_user') || 'null');

    if (jwt && userInfo) {
      showLoggedIn(userInfo, jwt);
    }

    // ── Helpers ─────────────────────────────────────────
    function showAuthStatus(msg, type = 'info') {
      const el = document.getElementById('authStatus');
      el.className = `status-msg ${type}`;
      el.innerHTML = msg;
    }

    function showLoggedIn(user, token) {
      document.getElementById('authInfo').classList.remove('hidden');
      document.getElementById('explorerCard').classList.remove('hidden');
      document.getElementById('jwtDisplay').textContent = token.slice(0, 40) + '...';
      document.getElementById('infoWallet').textContent = user.walletAddress || '-';
      document.getElementById('infoDelegate').textContent = user.delegateAddress || '-';
      document.getElementById('infoUserId').textContent = user.id || '-';
    }

    function setLoading(btnId, on) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      const orig = btn.dataset.orig || btn.textContent;
      if (on) {
        btn.dataset.orig = orig;
        btn.innerHTML = '<span class="loading"></span>Working...';
        btn.disabled = true;
      } else {
        btn.textContent = orig;
        btn.disabled = false;
      }
    }

    // ── Register ────────────────────────────────────────
    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      if (!username) { showAuthStatus('Enter a username', 'error'); return; }

      setLoading('registerBtn', true);
      showAuthStatus('<span class="loading"></span>Getting challenge...', 'info');

      try {
        const optionsRes = await fetch(`${API}/v1/auth/passkey/options`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'register', username }),
        });
        const options = await optionsRes.json();
        if (!optionsRes.ok) throw new Error(options.message || optionsRes.statusText);

        showAuthStatus('<span class="loading"></span>Creating passkey...', 'info');
        const credential = await navigator.credentials.create({
          publicKey: toCreationOptions(options),
        });

        const publicKey = await extractPublicKeyHex(credential);
        console.log('Credential registered:', credential.id);
        localStorage.setItem('omniflow_credential', JSON.stringify({
          id: credential.id, publicKey,
        }));

        showAuthStatus('<span class="loading"></span>Verifying & registering...', 'info');
        const serialized = serializeCredential(credential);
        const res = await fetch(`${API}/v1/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, credential: serialized, publicKey }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || res.statusText);

        jwt = data.accessToken;
        userInfo = data.user;
        localStorage.setItem('omniflow_jwt', jwt);
        localStorage.setItem('omniflow_user', JSON.stringify(userInfo));

        showAuthStatus('Wallet created!', 'success');
        showLoggedIn(userInfo, jwt);
      } catch (err) {
        console.error('Register error:', err);
        showAuthStatus('Error: ' + err.message, 'error');
      } finally {
        setLoading('registerBtn', false);
      }
    }

    // ── Login ───────────────────────────────────────────
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      if (!username) { showAuthStatus('Enter a username', 'error'); return; }

      setLoading('loginBtn', true);
      showAuthStatus('<span class="loading"></span>Getting challenge...', 'info');

      try {
        const optionsRes = await fetch(`${API}/v1/auth/passkey/options`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'login', username }),
        });
        const options = await optionsRes.json();
        if (!optionsRes.ok) throw new Error(options.message || optionsRes.statusText);

        showAuthStatus('<span class="loading"></span>Authenticating with passkey...', 'info');
        const credential = await navigator.credentials.get({
          publicKey: toRequestOptions(options),
        });

        console.log('Credential login:', credential.id);
        const storedCred = JSON.parse(localStorage.getItem('omniflow_credential') || 'null');
        if (storedCred) {
          storedCred.id = credential.id;
          localStorage.setItem('omniflow_credential', JSON.stringify(storedCred));
        }

        showAuthStatus('<span class="loading"></span>Verifying & logging in...', 'info');
        const serialized = serializeCredential(credential);
        const res = await fetch(`${API}/v1/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, credential: serialized }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || res.statusText);

        jwt = data.accessToken;
        userInfo = data.user;
        localStorage.setItem('omniflow_jwt', jwt);
        localStorage.setItem('omniflow_user', JSON.stringify(userInfo));

        showAuthStatus('Logged in!', 'success');
        showLoggedIn(userInfo, jwt);
      } catch (err) {
        console.error('Login error:', err);
        showAuthStatus('Error: ' + err.message, 'error');
      } finally {
        setLoading('loginBtn', false);
      }
    }

    // ── Generic API call ────────────────────────────────
    async function apiCall(method, path, body) {
      const resBox = document.getElementById('apiResponse');
      const resStatus = document.getElementById('resStatus');
      const resBody = document.getElementById('resBody');

      // Remove any previous sign buttons
      resBox.querySelectorAll('.sign-btn, [data-sign-row]').forEach(b => b.remove());

      resBox.classList.remove('hidden');
      resStatus.className = 'res-status';
      resStatus.textContent = `${method} ${path} ...`;
      resBody.textContent = '';

      try {
        const opts = {
          method,
          headers: {
            'Content-Type': 'application/json',
            ...(jwt ? { Authorization: `Bearer ${jwt}` } : {}),
          },
        };
        if (body && method !== 'GET') opts.body = JSON.stringify(body);

        const res = await fetch(`${API}${path}`, opts);
        const data = await res.json().catch(() => res.text());

        resStatus.textContent = `${method} ${path}  \u2014  ${res.status} ${res.statusText}`;
        resStatus.classList.add(res.ok ? 'res-ok' : 'res-err');
        resBody.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);

        // Auto-detect signRequests and show Sign button
        if (res.ok && data && data.signRequests && data.signRequests.length > 0) {
          showSignButton(resBox, data.id, data.signRequests);
        }

        return data;
      } catch (err) {
        resStatus.textContent = `${method} ${path}  \u2014  ERROR`;
        resStatus.classList.add('res-err');
        resBody.textContent = err.message;
        return null;
      }
    }

    // ── Sign button for operations ──────────────────────
    function showSignButton(container, operationId, signRequests) {
      const clientSteps = signRequests.filter(r => !r.serverSide && (r.userOpHash || r.calls));
      const hasSwap = signRequests.some(r => r.type === 'LIFI_SWAP' && (r.userOpHash || r.calls));
      const label = hasSwap
        ? 'Refresh Quote & Sign'
        : clientSteps.length > 0
          ? `Sign & Execute (${clientSteps.length} UserOps)`
          : 'Submit (server-side steps only)';

      const btnRow = document.createElement('div');
      btnRow.setAttribute('data-sign-row', '1');
      btnRow.style.cssText = 'display:flex;gap:8px;margin-top:12px;';

      const signBtn = document.createElement('button');
      signBtn.className = 'btn btn-primary sign-btn';
      signBtn.textContent = label;
      signBtn.onclick = async () => {
        if (hasSwap) {
          signBtn.disabled = true;
          signBtn.textContent = 'Refreshing quote...';
          const resBody = document.getElementById('resBody');
          try {
            const res = await fetch(`${API}/v1/operations/${operationId}/refresh-swap`, {
              method: 'POST',
              headers: { Authorization: `Bearer ${jwt}` },
            });
            const data = await res.json();
            if (!res.ok) {
              resBody.textContent += `\n\nRefresh failed: ${data.message || JSON.stringify(data)}`;
              signBtn.disabled = false;
              signBtn.textContent = label;
              return;
            }
            resBody.textContent += `\n\nQuote refreshed: ${data.quote?.tool} route, output: ${data.quote?.outputToken}`;
            btnRow.remove();
            handleSignRequests(operationId, data.signRequests);
          } catch (err) {
            resBody.textContent += `\n\nRefresh error: ${err.message}`;
            signBtn.disabled = false;
            signBtn.textContent = label;
          }
        } else {
          btnRow.remove();
          handleSignRequests(operationId, signRequests);
        }
      };
      btnRow.appendChild(signBtn);

      if (hasSwap) {
        const refreshBtn = document.createElement('button');
        refreshBtn.className = 'btn btn-secondary';
        refreshBtn.textContent = 'Refresh Only';
        refreshBtn.onclick = async () => {
          refreshBtn.disabled = true;
          refreshBtn.textContent = 'Refreshing...';
          const resBody = document.getElementById('resBody');
          try {
            const res = await fetch(`${API}/v1/operations/${operationId}/refresh-swap`, {
              method: 'POST',
              headers: { Authorization: `Bearer ${jwt}` },
            });
            const data = await res.json();
            if (!res.ok) {
              resBody.textContent += `\n\nRefresh failed: ${data.message || JSON.stringify(data)}`;
              refreshBtn.disabled = false;
              refreshBtn.textContent = 'Refresh Only';
              return;
            }
            resBody.textContent += `\n\nQuote refreshed: ${data.quote?.tool} route, output: ${data.quote?.outputToken}`;
            btnRow.remove();
            showSignButton(container, operationId, data.signRequests);
          } catch (err) {
            resBody.textContent += `\n\nRefresh error: ${err.message}`;
            refreshBtn.disabled = false;
            refreshBtn.textContent = 'Refresh Only';
          }
        };
        btnRow.appendChild(refreshBtn);
      }

      container.appendChild(btnRow);
    }

    // ── Sign & Execute UserOps ─────────────────────────
    // Handles two kinds of signRequests:
    // 1. Pre-prepared: has `userOpHash` -> sign directly
    // 2. Raw calls: has `calls` -> prepare UserOp -> sign -> submit -> get txHash
    async function handleSignRequests(operationId, signRequests) {
      const resBox = document.getElementById('apiResponse');
      const resStatus = document.getElementById('resStatus');
      const resBody = document.getElementById('resBody');

      const credJson = localStorage.getItem('omniflow_credential');
      if (!credJson) {
        resBody.textContent += '\n\nERROR: No credential stored. Please re-login.';
        resStatus.className = 'res-status res-err';
        return;
      }
      const cred = JSON.parse(credJson);

      const clientSteps = signRequests.filter(r => !r.serverSide && (r.userOpHash || r.calls));

      if (clientSteps.length === 0) {
        resBody.textContent += '\n\nNo client signing needed — submitting to server...';
        const result = await submitSignatures(operationId, []);
        handleSubmitResult(resBox, resStatus, resBody, operationId, result);
        return;
      }

      resStatus.textContent = 'Preparing & signing UserOps with Passkey...';
      resStatus.className = 'res-status';

      const owner = toWebAuthnAccount({
        credential: { id: cred.id, publicKey: cred.publicKey },
      });

      const signatures = [];

      for (let i = 0; i < clientSteps.length; i++) {
        const req = clientSteps[i];
        resBody.textContent += `\n\n[${i + 1}/${clientSteps.length}] ${req.description || req.type} (${req.chain})...`;

        try {
          let userOpHash = req.userOpHash;
          let requestId = null;

          // If no pre-built userOpHash, prepare the UserOp from calls first
          if (!userOpHash && req.calls) {
            resBody.textContent += '\n  Preparing UserOp...';
            const prepRes = await fetch(`${API}/v1/wallet/userop/prepare`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${jwt}`,
              },
              body: JSON.stringify({ chain: req.chain, calls: req.calls }),
            });
            const prepData = await prepRes.json();
            if (!prepRes.ok) {
              throw new Error(prepData.message || JSON.stringify(prepData));
            }
            userOpHash = prepData.userOpHash;
            requestId = prepData.requestId;
            resBody.textContent += ` hash=${userOpHash.slice(0, 14)}...`;
          }

          // Sign the UserOp hash with Passkey (biometric prompt)
          resBody.textContent += '\n  Signing...';
          const result = await owner.sign({ hash: userOpHash });
          const signature = typeof result === 'string' ? result : result.signature;
          const webauthn = typeof result === 'object' ? result.webauthn : undefined;
          resBody.textContent += ` ok`;

          // If we prepared via userop/prepare, submit via userop/submit to get txHash
          if (requestId) {
            resBody.textContent += '\n  Submitting UserOp to bundler...';
            const subRes = await fetch(`${API}/v1/wallet/userop/submit`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${jwt}`,
              },
              body: JSON.stringify({ requestId, signature, webauthn }),
            });
            const subData = await subRes.json();
            if (!subRes.ok) {
              throw new Error(subData.message || JSON.stringify(subData));
            }
            resBody.textContent += ` txHash=${subData.txHash.slice(0, 14)}...`;
            signatures.push({ stepId: req.stepId, txHash: subData.txHash });
          } else {
            signatures.push({ stepId: req.stepId, signature, webauthn });
          }
        } catch (err) {
          resBody.textContent += `\n  ERROR: ${err.message || err}`;
          console.error('Sign error for step', req.stepId, err);
        }
      }

      if (signatures.length > 0) {
        resBody.textContent += `\n\nSubmitting ${signatures.length} result(s) to operation...`;
        const result = await submitSignatures(operationId, signatures);
        handleSubmitResult(resBox, resStatus, resBody, operationId, result);
      } else {
        resStatus.textContent = 'No signatures collected';
        resStatus.className = 'res-status res-err';
      }
    }

    async function submitSignatures(operationId, signatures) {
      try {
        const res = await fetch(`${API}/v1/operations/${operationId}/submit`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${jwt}`,
          },
          body: JSON.stringify({ signatures }),
        });
        return await res.json();
      } catch (err) {
        return { error: err.message };
      }
    }

    function handleSubmitResult(resBox, resStatus, resBody, operationId, result) {
      resBody.textContent += '\n\n--- Submit Response ---\n';
      resBody.textContent += JSON.stringify(result, null, 2);

      if (result.error) {
        resStatus.textContent = 'Submit failed';
        resStatus.className = 'res-status res-err';
        return;
      }

      resStatus.textContent = `Operation ${result.status || 'submitted'}`;
      resStatus.className = 'res-status res-ok';

      if (result.status === 'PROCESSING') {
        resBody.textContent += '\n\nServer is processing burn intent + mint (waiting for chain finality)...';
        resBody.textContent += '\nPolling every 15s for completion...';
        pollOperationStatus(resBox, resStatus, resBody, operationId);
      }
    }

    async function pollOperationStatus(resBox, resStatus, resBody, operationId) {
      let attempts = 0;
      const maxAttempts = 80;
      const interval = 15_000;

      const poll = async () => {
        attempts++;
        try {
          const res = await fetch(`${API}/v1/operations/${operationId}`, {
            headers: { Authorization: `Bearer ${jwt}` },
          });
          const data = await res.json();

          if (data.status === 'COMPLETED') {
            resBody.textContent += `\n\nOperation COMPLETED! (after ${attempts * 15}s)`;
            resBody.textContent += '\n' + JSON.stringify(data, null, 2);
            resStatus.textContent = 'Operation COMPLETED';
            resStatus.className = 'res-status res-ok';
            return;
          }

          if (data.status === 'FAILED') {
            resBody.textContent += `\n\nOperation FAILED: ${data.errorMessage || 'unknown'}`;
            resStatus.textContent = 'Operation FAILED';
            resStatus.className = 'res-status res-err';
            return;
          }

          if (data.status === 'AWAITING_SIGNATURE' && data.signRequests && data.signRequests.length > 0) {
            resBody.textContent += `\n\nOperation needs your signature for swap step!`;
            resBody.textContent += '\n' + JSON.stringify(data, null, 2);
            resStatus.textContent = 'Awaiting Signature (swap)';
            resStatus.className = 'res-status';
            showSignButton(resBox, data.id, data.signRequests);
            return;
          }

          const stepsInfo = (data.steps || []).map(s => `${s.type}:${s.status}`).join(', ');
          resBody.textContent += `\n  [${attempts * 15}s] ${data.status} — steps: ${stepsInfo}`;

          if (attempts < maxAttempts) {
            setTimeout(poll, interval);
          } else {
            resBody.textContent += '\n\nPolling timeout (20 min). Check status manually.';
          }
        } catch (err) {
          resBody.textContent += `\n  Poll error: ${err.message}`;
          if (attempts < maxAttempts) setTimeout(poll, interval);
        }
      };

      setTimeout(poll, interval);
    }

    // ── Wallet: Delegate (atomic: prepare -> sign -> submit) ──────────────
    async function doPrepareDelegate() {
      const chain = document.getElementById('delegateChain').value;
      const data = await apiCall('POST', '/v1/wallet/delegate', { chain });

      if (data && data.userOpHash) {
        await signDelegateAndSubmit(chain, data.userOpHash);

    async function signDelegateAndSubmit(chain, userOpHash) {
      const resBody = document.getElementById('resBody');
      const resStatus = document.getElementById('resStatus');

      const credJson = localStorage.getItem('omniflow_credential');
      if (!credJson) {
        resBody.textContent += '\n\nERROR: No credential stored. Please re-login.';
        return;
      }
      const cred = JSON.parse(credJson);

      try {
        resBody.textContent += '\n\nSigning delegate UserOp hash...';
        resStatus.textContent = 'Signing with Passkey...';
        resStatus.className = 'res-status';

        const owner = toWebAuthnAccount({
          credential: { id: cred.id, publicKey: cred.publicKey },
        });

        const result = await owner.sign({ hash: userOpHash });
        const signature = typeof result === 'string' ? result : result.signature;
        const webauthn = typeof result === 'object' ? result.webauthn : undefined;

        console.log('[delegate] signature:', signature?.slice(0, 30), 'webauthn:', !!webauthn);
        resBody.textContent += `\nSigned: ${signature?.slice(0, 30)}...`;
        resBody.textContent += '\n\nSubmitting signature to backend...';

        await apiCall('POST', '/v1/wallet/delegate/submit', { chain, signature, webauthn });
      } catch (err) {
        resBody.textContent += `\nERROR: ${err.message}`;
        resStatus.textContent = 'Delegate signing failed';
        resStatus.className = 'res-status res-err';
        console.error('Delegate sign error:', err);
      }
    }

    // ── Wallet: Enable Executor (prepare -> sign -> submit) ──────────────
    async function doEnableExecutor() {
      const chain = document.getElementById('enableExecutorChain').value;
      const resBody = document.getElementById('resBody');
      const resStatus = document.getElementById('resStatus');

      const data = await apiCall('POST', '/v1/wallet/enable-executor', { chain });
      if (!data) return;

      if (data.alreadyEnabled) {
        resBody.textContent += '\n\nECDSA validator already enabled on this chain.';
        return;
      }

      const credJson = localStorage.getItem('omniflow_credential');
      if (!credJson) {
        resBody.textContent += '\n\nERROR: No credential stored. Please re-login.';
        return;
      }
      const cred = JSON.parse(credJson);

      try {
        const owner = toWebAuthnAccount({
          credential: { id: cred.id, publicKey: cred.publicKey },
        });

        const submitBody = { chain };

        // Step 1: Sign uninstall UserOp if needed
        if (data.needsUninstall) {
          resBody.textContent += '\n\nModule previously installed — signing uninstall UserOp...';
          resStatus.textContent = 'Signing uninstall with Passkey...';

          const uninstallResult = await owner.sign({ hash: data.uninstallUserOpHash });
          const uninstallSig = typeof uninstallResult === 'string' ? uninstallResult : uninstallResult.signature;
          const uninstallWa = typeof uninstallResult === 'object' ? uninstallResult.webauthn : undefined;

          submitBody.uninstallRequestId = data.uninstallRequestId;
          submitBody.uninstallSignature = uninstallSig;
          submitBody.uninstallWebauthn = uninstallWa;

          resBody.textContent += `\nUninstall signed: ${uninstallSig?.slice(0, 30)}...`;
        }

        // Step 2: Sign enable hash
        resBody.textContent += '\n\nSigning enable hash...';
        resStatus.textContent = 'Signing enable with Passkey...';

        const enableResult = await owner.sign({ hash: data.enableHash });
        const enableSig = typeof enableResult === 'string' ? enableResult : enableResult.signature;
        const enableWa = typeof enableResult === 'object' ? enableResult.webauthn : undefined;

        submitBody.enableSignature = enableSig;
        submitBody.webauthn = enableWa;

        resBody.textContent += `\nEnable signed: ${enableSig?.slice(0, 30)}...`;
        resBody.textContent += '\n\nSubmitting to backend...';
        resStatus.textContent = 'Submitting enable executor...';

        await apiCall('POST', '/v1/wallet/enable-executor/submit', submitBody);
      } catch (err) {
        resBody.textContent += `\nERROR: ${err.message}`;
        resStatus.textContent = 'Enable executor failed';
        resStatus.className = 'res-status res-err';
        console.error('Enable executor error:', err);
      }
    }

    async function doSubmitOp() {
      const id = document.getElementById('opId').value.trim();
      const sigsRaw = document.getElementById('opSignatures').value.trim();
      if (!id) { alert('Enter operation ID'); return; }
      if (!sigsRaw) { alert('Enter signatures JSON'); return; }

      let signatures;
      try {
        signatures = JSON.parse(sigsRaw);
      } catch {
        alert('Invalid JSON in signatures field');
        return;
      }

      await apiCall('POST', `/v1/operations/${id}/submit`, { signatures });
    }

    // ── Payments ────────────────────────────────────────
    async function doCreatePayment() {
      const amount = document.getElementById('payAmount').value.trim();
      if (!amount) { alert('Enter amount'); return; }
      const body = {
        amount,
        token: document.getElementById('payToken').value,
        chain: document.getElementById('payChain').value,
      };
      const desc = document.getElementById('payDesc').value.trim();
      if (desc) body.description = desc;
      await apiCall('POST', '/v1/payments', body);
    }

    async function doGetPayment() {
      const id = document.getElementById('payId').value.trim();
      if (!id) { alert('Enter payment ID'); return; }
      await apiCall('GET', `/v1/payments/${id}`);
    }

    async function doCancelPayment() {
      const id = document.getElementById('payId').value.trim();
      if (!id) { alert('Enter payment ID'); return; }
      await apiCall('POST', `/v1/payments/${id}/cancel`);
    }

    // ── Webhooks ────────────────────────────────────────
    async function doCreateWebhook() {
      const url = document.getElementById('webhookUrl').value.trim();
      if (!url) { alert('Enter webhook URL'); return; }
      await apiCall('POST', '/v1/webhooks', { url });
    }

    async function doDeleteWebhook() {
      const id = document.getElementById('webhookDeleteId').value.trim();
      if (!id) { alert('Enter webhook ID'); return; }
      await apiCall('DELETE', `/v1/webhooks/${id}`);
    }

    // ── Expose to window for onclick ────────────────────
    window.doRegister = doRegister;
    window.doLogin = doLogin;
    window.apiCall = apiCall;
    window.doPrepareDelegate = doPrepareDelegate;
    window.doEnableExecutor = doEnableExecutor;
    window.doCollect = doCollect;
    window.doSend = doSend;
    window.doBridge = doBridge;
    window.doBatchSend = doBatchSend;
    window.addBatchRow = addBatchRow;
    window.doSwapDeposit = doSwapDeposit;
    window.doGetOp = doGetOp;
    window.doSubmitOp = doSubmitOp;
    window.handleSignRequests = handleSignRequests;
    window.signDelegateAndSubmit = signDelegateAndSubmit;
    window.doCreatePayment = doCreatePayment;
    window.doGetPayment = doGetPayment;
    window.doCancelPayment = doCancelPayment;
    window.doCreateWebhook = doCreateWebhook;
    window.doDeleteWebhook = doDeleteWebhook;
  </script>
</body>
</html>
