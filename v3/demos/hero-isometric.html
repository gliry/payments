<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniFlow — Isometric Payment Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #0b0d12;
        font-family: "Sora", sans-serif;
        color: #e4e5ea;
        overflow-x: hidden;
      }

      /* ── NAV ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 72px;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 clamp(1.5rem, 4vw, 3rem);
        background: rgba(11, 13, 18, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .nav-logo {
        font-size: 1.25rem;
        font-weight: 700;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .nav-cta {
        font-family: "Sora", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 10px 24px;
        border-radius: 999px;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        transition: box-shadow 0.3s;
      }
      .nav-cta:hover {
        box-shadow: 0 0 24px rgba(159, 114, 255, 0.45);
      }

      /* ── HERO CONTENT ── */
      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 120px;
      }
      .hero-content {
        text-align: center;
        max-width: 720px;
        padding: 0 1.5rem;
        z-index: 2;
      }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 500;
        color: #9f72ff;
        background: rgba(159, 114, 255, 0.08);
        border: 1px solid transparent;
        background-clip: padding-box;
        position: relative;
        margin-bottom: 2rem;
      }
      .badge::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 999px;
        padding: 1px;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
      }

      .headline {
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: 700;
        line-height: 1.1;
        color: #e4e5ea;
        margin-bottom: 1.25rem;
      }
      .subtitle {
        font-size: clamp(1rem, 2vw, 1.25rem);
        font-weight: 400;
        color: #7c7e8a;
        line-height: 1.65;
        max-width: 600px;
        margin: 0 auto 2rem;
      }

      /* Stats */
      .stats {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px 20px;
        font-size: 14px;
        font-weight: 500;
        color: #7c7e8a;
        margin-bottom: 2.25rem;
      }
      .stats span {
        white-space: nowrap;
      }
      .stats .sep {
        color: rgba(255, 255, 255, 0.15);
      }

      /* Buttons */
      .btn-row {
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .btn-primary {
        font-family: "Sora", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 14px 36px;
        border-radius: 999px;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        transition:
          box-shadow 0.3s,
          transform 0.2s;
      }
      .btn-primary:hover {
        box-shadow: 0 0 32px rgba(159, 114, 255, 0.5);
        transform: translateY(-1px);
      }
      .btn-ghost {
        font-family: "Sora", sans-serif;
        font-size: 1rem;
        font-weight: 500;
        color: #e4e5ea;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
        padding: 14px 36px;
        border-radius: 999px;
        transition:
          border-color 0.3s,
          background 0.3s;
      }
      .btn-ghost:hover {
        border-color: rgba(255, 255, 255, 0.6);
        background: rgba(255, 255, 255, 0.04);
      }

      /* ── ISOMETRIC DIAGRAM ── */
      .diagram-wrap {
        width: 100%;
        max-width: 900px;
        margin: 3rem auto 0;
        padding: 0 1rem;
        opacity: 0.7;
        transition: opacity 0.4s;
      }
      .diagram-wrap:hover {
        opacity: 0.85;
      }

      .diagram-svg {
        width: 100%;
        height: auto;
        display: block;
      }

      /* Card styling inside SVG uses attributes, but we add glow filters */

      /* Floating animations */
      @keyframes floatA {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @keyframes floatB {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      @keyframes floatC {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      .float-a {
        animation: floatA 3s ease-in-out infinite;
      }
      .float-b {
        animation: floatB 3.4s ease-in-out infinite 0.4s;
      }
      .float-c {
        animation: floatC 2.8s ease-in-out infinite 0.8s;
      }
      .float-d {
        animation: floatA 3.2s ease-in-out infinite 0.2s;
      }
      .float-e {
        animation: floatB 3.6s ease-in-out infinite 0.6s;
      }
      .float-f {
        animation: floatC 3s ease-in-out infinite 1s;
      }
      .float-g {
        animation: floatA 3.1s ease-in-out infinite 0.5s;
      }
      .float-h {
        animation: floatB 2.9s ease-in-out infinite 0.9s;
      }

      /* Dash flow animation */
      @keyframes dashFlow {
        to {
          stroke-dashoffset: -24;
        }
      }
      .flow-line {
        stroke-dasharray: 8 4;
        animation: dashFlow 1.2s linear infinite;
      }

      /* Center glow pulse */
      @keyframes glowPulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.7;
        }
      }
      .center-glow {
        animation: glowPulse 2.5s ease-in-out infinite;
      }

      /* Packet travel along path */
      @keyframes packetMove {
        0% {
          offset-distance: 0%;
          opacity: 0;
        }
        5% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          offset-distance: 100%;
          opacity: 0;
        }
      }

      /* Highlight states (toggled via JS) */
      .flow-line.highlight {
        stroke-opacity: 1 !important;
        filter: url(#lineGlow);
      }
      .flow-line.highlight {
        animation-duration: 0.5s;
      }

      /* ── MOBILE ── */
      @media (max-width: 767px) {
        .diagram-wrap {
          margin-top: 2rem;
        }
        .hide-mobile {
          display: none;
        }
        .hero {
          padding-top: 100px;
        }
      }

      /* ── REDUCED MOTION ── */
      @media (prefers-reduced-motion: reduce) {
        .float-a,
        .float-b,
        .float-c,
        .float-d,
        .float-e,
        .float-f,
        .float-g,
        .float-h {
          animation: none;
        }
        .flow-line {
          animation: none;
        }
        .center-glow {
          animation: none;
          opacity: 0.5;
        }
        .packet {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <div class="nav-logo">OmniFlow</div>
      <button class="nav-cta">Start Free Trial</button>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-content">
        <div class="badge">&#127942; 1st Place — ETHGlobal HackMoney 2026</div>
        <h1 class="headline">Cross-Chain Payments.<br />One Click.</h1>
        <p class="subtitle">
          Upload CSV. Select recipients across any chain. Pay your entire team
          in 30 seconds — not 2 hours.
        </p>
        <div class="stats">
          <span>30+ Chains</span><span class="sep">|</span>
          <span>Any Token</span><span class="sep">|</span> <span>$0 Gas</span
          ><span class="sep">|</span>
          <span>Non-Custodial</span>
        </div>
        <div class="btn-row">
          <button class="btn-primary">Start Free Trial</button>
          <button class="btn-ghost">Watch Demo</button>
        </div>
      </div>

      <!-- ISOMETRIC DIAGRAM -->
      <div class="diagram-wrap">
        <svg
          class="diagram-svg"
          viewBox="0 0 860 380"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <!-- Gradient: brand -->
            <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1894E8" />
              <stop offset="100%" stop-color="#9F72FF" />
            </linearGradient>

            <!-- Line gradients: source side -->
            <linearGradient id="lineGradSrc1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#7C7E8A" />
              <stop offset="100%" stop-color="#1894E8" />
            </linearGradient>
            <linearGradient id="lineGradSrc2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#7C7E8A" />
              <stop offset="100%" stop-color="#1894E8" />
            </linearGradient>
            <linearGradient id="lineGradSrc3" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#7C7E8A" />
              <stop offset="100%" stop-color="#1894E8" />
            </linearGradient>

            <!-- Line gradients: recipient side (brand → chain color) -->
            <linearGradient id="lineGradBase" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#9F72FF" />
              <stop offset="100%" stop-color="#0052FF" />
            </linearGradient>
            <linearGradient id="lineGradArb" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#9F72FF" />
              <stop offset="100%" stop-color="#28A0F0" />
            </linearGradient>
            <linearGradient id="lineGradEth" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#9F72FF" />
              <stop offset="100%" stop-color="#627EEA" />
            </linearGradient>
            <linearGradient id="lineGradOp" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#9F72FF" />
              <stop offset="100%" stop-color="#FF0420" />
            </linearGradient>
            <linearGradient id="lineGradAvax" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#9F72FF" />
              <stop offset="100%" stop-color="#E84142" />
            </linearGradient>

            <!-- Glow filters -->
            <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
              <feFlood
                flood-color="#1894E8"
                flood-opacity="0.15"
                result="color"
              />
              <feComposite in="color" in2="blur" operator="in" result="glow" />
              <feMerge>
                <feMergeNode in="glow" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <filter
              id="centerGlowFilter"
              x="-40%"
              y="-40%"
              width="180%"
              height="180%"
            >
              <feGaussianBlur
                in="SourceAlpha"
                stdDeviation="16"
                result="blur"
              />
              <feFlood
                flood-color="#6B7FE8"
                flood-opacity="0.4"
                result="color"
              />
              <feComposite in="color" in2="blur" operator="in" result="glow" />
              <feMerge>
                <feMergeNode in="glow" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <filter id="lineGlow" x="-10%" y="-50%" width="120%" height="200%">
              <feGaussianBlur stdDeviation="3" />
            </filter>
            <filter
              id="packetGlow"
              x="-100%"
              y="-100%"
              width="300%"
              height="300%"
            >
              <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
            </filter>

            <!-- Isometric transform skew (applied via group transforms) -->
          </defs>

          <!-- ══════════ CONNECTION PATHS ══════════ -->
          <!-- Source → Center paths -->
          <path
            id="pathSrc1"
            d="M 160 80 C 250 80, 300 155, 370 160"
            fill="none"
            stroke="url(#lineGradSrc1)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line"
            data-group="src1"
          />
          <path
            id="pathSrc2"
            d="M 160 190 C 250 190, 300 175, 370 175"
            fill="none"
            stroke="url(#lineGradSrc2)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line"
            data-group="src2"
          />
          <path
            id="pathSrc3"
            d="M 160 300 C 250 300, 300 200, 370 190"
            fill="none"
            stroke="url(#lineGradSrc3)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line"
            data-group="src3"
          />

          <!-- Center → Recipient paths -->
          <path
            id="pathDst1"
            d="M 530 145 C 600 140, 620 55, 700 52"
            fill="none"
            stroke="url(#lineGradBase)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line"
            data-group="dst1"
          />
          <path
            id="pathDst2"
            d="M 530 160 C 600 158, 640 115, 700 118"
            fill="none"
            stroke="url(#lineGradArb)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line"
            data-group="dst2"
          />
          <path
            id="pathDst3"
            d="M 530 175 C 600 175, 640 178, 700 185"
            fill="none"
            stroke="url(#lineGradEth)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line"
            data-group="dst3"
          />
          <path
            id="pathDst4"
            d="M 530 190 C 600 195, 640 240, 700 252"
            fill="none"
            stroke="url(#lineGradOp)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line hide-mobile"
            data-group="dst4"
          />
          <path
            id="pathDst5"
            d="M 530 200 C 600 210, 640 300, 700 318"
            fill="none"
            stroke="url(#lineGradAvax)"
            stroke-width="1.5"
            stroke-opacity="0.4"
            class="flow-line hide-mobile"
            data-group="dst5"
          />

          <!-- ══════════ SOURCE CARDS (LEFT) ══════════ -->
          <!-- Treasury -->
          <g
            class="float-a source-card"
            data-group="src1"
            transform="translate(20, 45)"
          >
            <rect
              x="0"
              y="0"
              width="140"
              height="66"
              rx="10"
              fill="#1A1D27"
              stroke="#2A2D37"
              stroke-width="1"
              filter="url(#cardGlow)"
            />
            <!-- Isometric top face -->
            <polygon
              points="10,0 140,0 130,-12 0,-12"
              fill="#222530"
              stroke="#2A2D37"
              stroke-width="0.5"
              opacity="0.7"
            />
            <!-- Isometric right face -->
            <polygon
              points="140,0 140,66 130,54 130,-12"
              fill="#16181f"
              stroke="#2A2D37"
              stroke-width="0.5"
              opacity="0.5"
            />
            <!-- Wallet icon -->
            <rect
              x="16"
              y="18"
              width="24"
              height="18"
              rx="3"
              fill="none"
              stroke="#7C7E8A"
              stroke-width="1.5"
            />
            <rect x="28" y="24" width="8" height="6" rx="2" fill="#7C7E8A" />
            <circle cx="33" cy="27" r="1.5" fill="#1A1D27" />
            <!-- Text -->
            <text
              x="50"
              y="27"
              fill="#E4E5EA"
              font-size="13"
              font-weight="600"
              font-family="Sora, sans-serif"
            >
              Treasury
            </text>
            <text
              x="50"
              y="44"
              fill="#7C7E8A"
              font-size="10"
              font-family="Sora, sans-serif"
            >
              Multi-sig
            </text>
          </g>

          <!-- Payroll CSV -->
          <g
            class="float-b source-card"
            data-group="src2"
            transform="translate(20, 155)"
          >
            <rect
              x="0"
              y="0"
              width="140"
              height="66"
              rx="10"
              fill="#1A1D27"
              stroke="#2A2D37"
              stroke-width="1"
              filter="url(#cardGlow)"
            />
            <polygon
              points="10,0 140,0 130,-12 0,-12"
              fill="#222530"
              stroke="#2A2D37"
              stroke-width="0.5"
              opacity="0.7"
            />
            <polygon
              points="140,0 140,66 130,54 130,-12"
              fill="#16181f"
              stroke="#2A2D37"
              stroke-width="0.5"
              opacity="0.5"
            />
            <!-- Doc icon -->
            <rect
              x="16"
              y="16"
              width="20"
              height="26"
              rx="2"
              fill="none"
              stroke="#7C7E8A"
              stroke-width="1.5"
            />
            <polyline
              points="28,16 28,22 36,22"
              fill="none"
              stroke="#7C7E8A"
              stroke-width="1.5"
            />
            <line
              x1="20"
              y1="28"
              x2="32"
              y2="28"
              stroke="#7C7E8A"
              stroke-width="1"
              opacity="0.6"
            />
            <line
              x1="20"
              y1="32"
              x2="30"
              y2="32"
              stroke="#7C7E8A"
              stroke-width="1"
              opacity="0.6"
            />
            <line
              x1="20"
              y1="36"
              x2="28"
              y2="36"
              stroke="#7C7E8A"
              stroke-width="1"
              opacity="0.6"
            />
            <!-- Text -->
            <text
              x="50"
              y="27"
              fill="#E4E5EA"
              font-size="13"
              font-weight="600"
              font-family="Sora, sans-serif"
            >
              Payroll CSV
            </text>
            <text
              x="50"
              y="44"
              fill="#7C7E8A"
              font-size="10"
              font-family="Sora, sans-serif"
            >
              Batch upload
            </text>
          </g>

          <!-- DAO Fund -->
          <g
            class="float-c source-card"
            data-group="src3"
            transform="translate(20, 265)"
          >
            <rect
              x="0"
              y="0"
              width="140"
              height="66"
              rx="10"
              fill="#1A1D27"
              stroke="#2A2D37"
              stroke-width="1"
              filter="url(#cardGlow)"
            />
            <polygon
              points="10,0 140,0 130,-12 0,-12"
              fill="#222530"
              stroke="#2A2D37"
              stroke-width="0.5"
              opacity="0.7"
            />
            <polygon
              points="140,0 140,66 130,54 130,-12"
              fill="#16181f"
              stroke="#2A2D37"
              stroke-width="0.5"
              opacity="0.5"
            />
            <!-- Community icon (3 people) -->
            <circle
              cx="22"
              cy="22"
              r="5"
              fill="none"
              stroke="#7C7E8A"
              stroke-width="1.5"
            />
            <path
              d="M 14 38 Q 14 30 22 30 Q 30 30 30 38"
              fill="none"
              stroke="#7C7E8A"
              stroke-width="1.5"
            />
            <circle
              cx="34"
              cy="24"
              r="3.5"
              fill="none"
              stroke="#7C7E8A"
              stroke-width="1"
              opacity="0.6"
            />
            <path
              d="M 29 36 Q 30 30 34 30 Q 40 30 40 36"
              fill="none"
              stroke="#7C7E8A"
              stroke-width="1"
              opacity="0.6"
            />
            <!-- Text -->
            <text
              x="50"
              y="27"
              fill="#E4E5EA"
              font-size="13"
              font-weight="600"
              font-family="Sora, sans-serif"
            >
              DAO Fund
            </text>
            <text
              x="50"
              y="44"
              fill="#7C7E8A"
              font-size="10"
              font-family="Sora, sans-serif"
            >
              Governance
            </text>
          </g>

          <!-- ══════════ CENTER ENGINE ══════════ -->
          <g class="float-d" id="centerEngine" transform="translate(350, 95)">
            <!-- Glow ring -->
            <ellipse
              cx="100"
              cy="85"
              rx="110"
              ry="80"
              fill="none"
              stroke="url(#brandGrad)"
              stroke-width="1.5"
              stroke-opacity="0.2"
              class="center-glow"
            />
            <ellipse
              cx="100"
              cy="85"
              rx="95"
              ry="68"
              fill="none"
              stroke="url(#brandGrad)"
              stroke-width="1"
              stroke-opacity="0.1"
              class="center-glow"
              style="animation-delay: 0.5s"
            />

            <!-- Isometric box — top face -->
            <polygon
              points="100,10 195,50 100,90 5,50"
              fill="url(#brandGrad)"
              opacity="0.9"
            />
            <!-- Isometric box — left face -->
            <polygon
              points="5,50 100,90 100,150 5,110"
              fill="#1060A8"
              opacity="0.8"
            />
            <!-- Isometric box — right face -->
            <polygon
              points="195,50 100,90 100,150 195,110"
              fill="#6B40C0"
              opacity="0.8"

    <script>
      (function () {
        "use strict";

        // Skip animations for reduced motion
        const prefersReduced = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;
        if (prefersReduced) return;

        const svg = document.querySelector(".diagram-svg");

        // Path IDs and their colors
        const pathConfigs = [
          { id: "pathSrc1", color: "#1894E8" },
          { id: "pathSrc2", color: "#1894E8" },
          { id: "pathSrc3", color: "#1894E8" },
          { id: "pathDst1", color: "#0052FF" },
          { id: "pathDst2", color: "#28A0F0" },
          { id: "pathDst3", color: "#627EEA" },
          { id: "pathDst4", color: "#FF0420" },
          { id: "pathDst5", color: "#E84142" },
        ];

        // Create packet using SVG animateMotion
        function spawnPacket() {
          const config =
            pathConfigs[Math.floor(Math.random() * pathConfigs.length)];
          const pathEl = document.getElementById(config.id);
          if (!pathEl) return;

          // Check if path's parent card is hidden on mobile
          const group = config.id.replace("path", "").toLowerCase();

          const ns = "http://www.w3.org/2000/svg";
          const circle = document.createElementNS(ns, "circle");
          circle.setAttribute("r", "4");
          circle.setAttribute("fill", config.color);
          circle.setAttribute("opacity", "0.9");
          circle.classList.add("packet");

          // Glow via filter
          const filterId = "pktGlow_" + Date.now() + Math.random();
          const filter = document.createElementNS(ns, "filter");
          filter.setAttribute("id", filterId);
          filter.setAttribute("x", "-100%");
          filter.setAttribute("y", "-100%");
          filter.setAttribute("width", "300%");
          filter.setAttribute("height", "300%");
          const blur = document.createElementNS(ns, "feGaussianBlur");
          blur.setAttribute("in", "SourceGraphic");
          blur.setAttribute("stdDeviation", "3");
          filter.appendChild(blur);
          svg.querySelector("defs").appendChild(filter);

          circle.setAttribute("filter", `url(#${filterId})`);

          // animateMotion
          const animMotion = document.createElementNS(ns, "animateMotion");
          animMotion.setAttribute("dur", "2s");
          animMotion.setAttribute("repeatCount", "1");
          animMotion.setAttribute("fill", "freeze");

          // Get path d attribute
          const pathD = pathEl.getAttribute("d");
          const mpath = document.createElementNS(ns, "mpath");
          mpath.setAttributeNS(
            "http://www.w3.org/1999/xlink",
            "href",
            "#" + config.id,
          );
          animMotion.appendChild(mpath);

          // Fade in/out via animate
          const animOpacity = document.createElementNS(ns, "animate");
          animOpacity.setAttribute("attributeName", "opacity");
          animOpacity.setAttribute("values", "0;0.9;0.9;0");
          animOpacity.setAttribute("keyTimes", "0;0.1;0.85;1");
          animOpacity.setAttribute("dur", "2s");
          animOpacity.setAttribute("fill", "freeze");

          circle.appendChild(animMotion);
          circle.appendChild(animOpacity);
          svg.appendChild(circle);

          // Cleanup after animation
          setTimeout(() => {
            circle.remove();
            filter.remove();
          }, 2200);
        }

        // Spawn packets at intervals
        setInterval(spawnPacket, 1500);
        // Initial burst
        setTimeout(spawnPacket, 300);
        setTimeout(spawnPacket, 800);

        // ── HOVER INTERACTIONS ──

        // Highlight paths matching a data-group
        function highlightGroup(group, on) {
          document
            .querySelectorAll(`.flow-line[data-group="${group}"]`)
            .forEach((line) => {
              if (on) {
                line.setAttribute("stroke-opacity", "0.9");
                line.setAttribute("stroke-width", "2.5");
                line.style.animationDuration = "0.4s";
              } else {
                line.setAttribute("stroke-opacity", "0.4");
                line.setAttribute("stroke-width", "1.5");
                line.style.animationDuration = "";
              }
            });
        }

        // Source cards hover
        document.querySelectorAll(".source-card").forEach((card) => {
          const group = card.getAttribute("data-group");
          card.addEventListener("mouseenter", () =>
            highlightGroup(group, true),
          );
          card.addEventListener("mouseleave", () =>
            highlightGroup(group, false),
          );
          card.style.cursor = "pointer";
        });

        // Recipient cards hover
        document.querySelectorAll(".recipient-card").forEach((card) => {
          const group = card.getAttribute("data-group");
          card.addEventListener("mouseenter", () =>
            highlightGroup(group, true),
          );
          card.addEventListener("mouseleave", () =>
            highlightGroup(group, false),
          );
          card.style.cursor = "pointer";
        });

        // Center engine hover — pulse all paths
        const center = document.getElementById("centerEngine");
        if (center) {
          center.style.cursor = "pointer";
          center.addEventListener("mouseenter", () => {
            document.querySelectorAll(".flow-line").forEach((line) => {
              line.setAttribute("stroke-opacity", "0.8");
              line.setAttribute("stroke-width", "2");
            });
          });
          center.addEventListener("mouseleave", () => {
            document.querySelectorAll(".flow-line").forEach((line) => {
              line.setAttribute("stroke-opacity", "0.4");
              line.setAttribute("stroke-width", "1.5");
            });
          });
        }
      })();
