<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniFlow — Chain Constellation Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d12;
        font-family: "Sora", sans-serif;
        color: #e4e5ea;
      }

      canvas#constellation {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* ── NAV ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 72px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 clamp(24px, 5vw, 64px);
        background: rgba(11, 13, 18, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .nav-logo {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .nav-cta {
        font-family: "Sora", sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 10px 24px;
        border-radius: 999px;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        transition: box-shadow 0.3s ease;
      }
      .nav-cta:hover {
        box-shadow:
          0 0 24px rgba(24, 148, 232, 0.4),
          0 0 48px rgba(159, 114, 255, 0.2);
      }

      /* ── HERO OVERLAY ── */
      .hero {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 100vh;
        padding: 96px 24px 48px;
        pointer-events: none;
      }
      .hero > * {
        pointer-events: auto;
      }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        color: #9f72ff;
        background: rgba(159, 114, 255, 0.06);
        border: 1px solid transparent;
        background-clip: padding-box;
        position: relative;
        margin-bottom: 32px;
      }
      .badge::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 999px;
        padding: 1px;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* Headline */
      .headline {
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: 700;
        line-height: 1.1;
        color: #e4e5ea;
        margin-bottom: 24px;
      }

      /* Subtitle */
      .subtitle {
        font-size: clamp(1rem, 2vw, 1.25rem);
        font-weight: 400;
        color: #7c7e8a;
        max-width: 600px;
        line-height: 1.6;
        margin-bottom: 40px;
      }

      /* Stats */
      .stats {
        display: flex;
        align-items: center;
        gap: 0;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 40px;
      }
      .stat {
        font-size: 14px;
        font-weight: 500;
        color: #a0a2aa;
        padding: 0 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }
      .stat:last-child {
        border-right: none;
      }
      .stat strong {
        color: #e4e5ea;
      }

      /* Buttons */
      .buttons {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn-primary {
        font-family: "Sora", sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 14px 36px;
        border-radius: 999px;
        background: linear-gradient(135deg, #1894e8, #9f72ff);
        transition:
          box-shadow 0.3s ease,
          transform 0.2s ease;
      }
      .btn-primary:hover {
        box-shadow:
          0 0 28px rgba(24, 148, 232, 0.45),
          0 0 56px rgba(159, 114, 255, 0.25);
        transform: translateY(-1px);
      }
      .btn-ghost {
        font-family: "Sora", sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: #e4e5ea;
        cursor: pointer;
        padding: 14px 36px;
        border-radius: 999px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition:
          background 0.3s ease,
          border-color 0.3s ease;
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.5);
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .badge,
        .headline,
        .subtitle,
        .stats,
        .buttons {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Nav -->
    <nav class="nav">
      <div class="nav-logo">OmniFlow</div>
      <button class="nav-cta">Start Free Trial</button>
    </nav>

    <!-- Canvas background -->
    <canvas id="constellation"></canvas>

    <!-- Hero content -->
    <main class="hero">
      <div class="badge">&#127942; 1st Place — ETHGlobal HackMoney 2026</div>
      <h1 class="headline">Cross-Chain Payments.<br />One Click.</h1>
      <p class="subtitle">
        Upload CSV. Select recipients across any chain. Pay your entire team in
        30 seconds — not 2 hours.
      </p>
      <div class="stats">
        <span class="stat"><strong>30+</strong>&nbsp;Chains</span>
        <span class="stat"><strong>Any</strong>&nbsp;Token</span>
        <span class="stat"><strong>$0</strong>&nbsp;Gas</span>
        <span class="stat"><strong>Non-Custodial</strong></span>
      </div>
      <div class="buttons">
        <button class="btn-primary">Start Free Trial</button>
        <button class="btn-ghost">Watch Demo</button>
      </div>
    </main>

    <script>
      (function () {
        const canvas = document.getElementById("constellation");
        const ctx = canvas.getContext("2d");

        let W, H, cx, cy;
        let mouseX = -9999,
          mouseY = -9999;
        let reducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;

        function resize() {
          const dpr = window.devicePixelRatio || 1;
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          cx = W / 2;
          cy = H / 2 + 60; // slightly below center
        }
        resize();
        window.addEventListener("resize", resize);

        window.addEventListener("mousemove", function (e) {
          mouseX = e.clientX;
          mouseY = e.clientY;
        });
        window.addEventListener("mouseleave", function () {
          mouseX = -9999;
          mouseY = -9999;
        });

        // Chain definitions
        const chains = [
          { label: "ETH", color: "#627eea", orbit: 160, speed: 0.3, angle: 0 },
          {
            label: "BASE",
            color: "#0052ff",
            orbit: 200,
            speed: 0.4,
            angle: Math.PI * 0.33,
          },
          {
            label: "ARB",
            color: "#28a0f0",
            orbit: 240,
            speed: 0.25,
            angle: Math.PI * 0.66,
          },
          {
            label: "OP",
            color: "#ff0420",
            orbit: 180,
            speed: 0.35,
            angle: Math.PI,
          },
          {
            label: "POLY",
            color: "#8247e5",
            orbit: 220,
            speed: 0.28,
            angle: Math.PI * 1.33,
          },
          {
            label: "AVAX",
            color: "#e84142",
            orbit: 260,
            speed: 0.2,
            angle: Math.PI * 1.66,
          },
        ];

        // Current visual scale for each chain (for hover smoothing)
        chains.forEach((c) => {
          c.scale = 1;
          c.currentSpeed = c.speed;
        });

        // Packets
        const packets = [];
        let lastPacketTime = 0;

        function spawnPacket(time) {
          const ci = Math.floor(Math.random() * chains.length);
          const c = chains[ci];
          const sx = cx + Math.cos(c.angle) * c.orbit;
          const sy = cy + Math.sin(c.angle) * c.orbit;
          packets.push({
            sx,
            sy,
            color: c.color,
            progress: 0, // 0→1 from chain to center
            duration: 800 + Math.random() * 400, // ms
            startTime: time,
            opacity: 1,
          });
        }

        // Dash offset for connection lines
        let dashOffset = 0;

        // Hub glow pulse
        let hubGlowPhase = 0;

        function draw(time) {
          ctx.clearRect(0, 0, W, H);

          // Background radial gradient
          const bgGrad = ctx.createRadialGradient(
            cx,
            cy,
            0,
            cx,
            cy,
            Math.max(W, H) * 0.6,
          );
          bgGrad.addColorStop(0, "rgba(159,114,255,0.03)");
          bgGrad.addColorStop(1, "rgba(11,13,18,0)");
          ctx.fillStyle = bgGrad;
          ctx.fillRect(0, 0, W, H);

          const dt = 1 / 60; // approximate

          // Update dash offset
          dashOffset -= 0.5;

          // Hub glow
          hubGlowPhase += 0.02;
          const glowRadius = 30 + Math.sin(hubGlowPhase) * 10; // 30-50

          // Update chain angles
          if (!reducedMotion) {
            chains.forEach((c) => {
              // Mouse proximity check
              const nx = cx + Math.cos(c.angle) * c.orbit;
              const ny = cy + Math.sin(c.angle) * c.orbit;
              const dx = mouseX - nx;
              const dy = mouseY - ny;
              const dist = Math.sqrt(dx * dx + dy * dy);
              const hovered = dist < 80;

              const targetSpeed = hovered ? c.speed * 0.2 : c.speed;
              const targetScale = hovered ? 1.3 : 1;
              c.currentSpeed += (targetSpeed - c.currentSpeed) * 0.08;
              c.scale += (targetScale - c.scale) * 0.08;

              c.angle += c.currentSpeed * dt;
            });
          }

          // Draw orbit paths (faint dashed circles)
          chains.forEach((c) => {
            ctx.beginPath();
            ctx.arc(cx, cy, c.orbit, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
          });

          // Draw connection lines
          chains.forEach((c) => {
            const nx = cx + Math.cos(c.angle) * c.orbit;
            const ny = cy + Math.sin(c.angle) * c.orbit;

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(nx, ny);

            // Parse color to rgba
            ctx.strokeStyle = hexToRGBA(c.color, 0.2);
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 6]);
            ctx.lineDashOffset = dashOffset;
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.lineDashOffset = 0;
          });

          // Draw center hub
          // Glow
          ctx.save();
          ctx.beginPath();
          ctx.arc(cx, cy, 40, 0, Math.PI * 2);
          ctx.shadowColor = "rgba(100,140,255,0.15)";
          ctx.shadowBlur = glowRadius;
          ctx.fillStyle = "transparent";
          ctx.fill();
          ctx.restore();

          // Outer glow ring
          ctx.save();
          ctx.beginPath();
          ctx.arc(cx, cy, 40 + 4, 0, Math.PI * 2);
          const ringGrad = ctx.createRadialGradient(cx, cy, 36, cx, cy, 56);
          ringGrad.addColorStop(0, "rgba(24,148,232,0.12)");
          ringGrad.addColorStop(0.5, "rgba(159,114,255,0.08)");
          ringGrad.addColorStop(1, "rgba(159,114,255,0)");
          ctx.fillStyle = ringGrad;
          ctx.fill();
          ctx.restore();

          // Hub fill
          ctx.save();
          ctx.beginPath();
          ctx.arc(cx, cy, 40, 0, Math.PI * 2);
          const hubGrad = ctx.createLinearGradient(
            cx - 40,
            cy - 40,
            cx + 40,
            cy + 40,
          );
          hubGrad.addColorStop(0, "#1894E8");
          hubGrad.addColorStop(1, "#9F72FF");
          ctx.fillStyle = hubGrad;
          ctx.shadowColor = "rgba(24,148,232,0.3)";
          ctx.shadowBlur = glowRadius;
          ctx.fill();
          ctx.restore();

          // Hub border
          ctx.beginPath();
          ctx.arc(cx, cy, 40, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.15)";
          ctx.lineWidth = 1;
          ctx.stroke();

          // Hub text
          ctx.fillStyle = "#fff";
          ctx.font = "600 16px Sora, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("OF", cx, cy);

          // Draw chain nodes
          chains.forEach((c) => {
            const nx = cx + Math.cos(c.angle) * c.orbit;
            const ny = cy + Math.sin(c.angle) * c.orbit;
            const r = 18 * c.scale;

            // Node glow
            ctx.save();
            ctx.beginPath();
            ctx.arc(nx, ny, r, 0, Math.PI * 2);
            ctx.shadowColor = hexToRGBA(c.color, 0.35);
            ctx.shadowBlur = 16 * c.scale;
            ctx.fillStyle = c.color;
            ctx.fill();
            ctx.restore();

            // Node border
            ctx.beginPath();
            ctx.arc(nx, ny, r, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.12)";
            ctx.lineWidth = 1;
            ctx.stroke();

            // Node label
            ctx.fillStyle = "#fff";
            ctx.font =
              "600 " + Math.round(10 * c.scale) + "px Sora, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(c.label, nx, ny);
          });

          // Spawn packets
          if (
            !reducedMotion &&
            time - lastPacketTime > 2000 + Math.random() * 1000
          ) {
            spawnPacket(time);
            lastPacketTime = time;
          }

          // Draw & update packets
          for (let i = packets.length - 1; i >= 0; i--) {
            const p = packets[i];
            const elapsed = time - p.startTime;
            p.progress = Math.min(elapsed / p.duration, 1);

            // Ease in-out
            const t =
              p.progress < 0.5
                ? 2 * p.progress * p.progress
                : 1 - Math.pow(-2 * p.progress + 2, 2) / 2;

            const px = p.sx + (cx - p.sx) * t;
            const py = p.sy + (cy - p.sy) * t;

            // Fade out in last 20%
            const alpha = p.progress > 0.8 ? (1 - p.progress) / 0.2 : 1;

            ctx.save();
            ctx.beginPath();
            ctx.arc(px, py, 4, 0, Math.PI * 2);
            ctx.fillStyle = hexToRGBA(p.color, alpha * 0.9);
            ctx.shadowColor = hexToRGBA(p.color, alpha * 0.6);
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.restore();

            if (p.progress >= 1) {
              packets.splice(i, 1);
            }
          }

          requestAnimationFrame(draw);
        }

        function hexToRGBA(hex, alpha) {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
        }

        // If reduced motion, set static angles spread evenly
        if (reducedMotion) {
          chains.forEach((c, i) => {
            c.angle = ((Math.PI * 2) / chains.length) * i;
          });
        }

        requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
